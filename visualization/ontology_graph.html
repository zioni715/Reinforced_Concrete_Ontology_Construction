<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>공사기성부분 내역서 RDF/RDFS 그래프</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d5dbe5;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 16px 22px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px 22px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    button,
    input {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.active {
      border-color: var(--accent);
      background: #ccfbf1;
      color: #0b4f49;
      font-weight: 700;
    }

    input {
      width: min(340px, 100%);
      padding: 0 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      height: calc(100vh - 112px);
      min-height: 620px;
    }

    .graph-panel {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background: #fbfcfe;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }

    svg:active {
      cursor: grabbing;
    }

    .side {
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }

    .side h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .side dl {
      margin: 0;
    }

    .side dt {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .side dd {
      margin: 4px 0 0;
      font-size: 13px;
      line-height: 1.48;
    }

    .side-section-title {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .legend,
    .relation-glossary {
      display: grid;
      gap: 9px;
      margin-top: 10px;
      font-size: 12px;
    }

    .legend {
      grid-template-columns: 1fr 1fr;
    }

    .legend-item,
    .relation-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      min-width: 0;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid currentColor;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .relation-dot {
      width: 13px;
      height: 3px;
      margin-top: 8px;
      border-radius: 999px;
      background: currentColor;
      flex: 0 0 auto;
    }

    .relation-name {
      font-weight: 700;
      color: var(--ink);
    }

    .relation-description,
    .relation-detail {
      margin-top: 2px;
      color: var(--muted);
      line-height: 1.42;
    }

    .relation-detail {
      display: block;
      font-size: 12px;
    }

    .attribute-group {
      margin-top: 8px;
    }

    .attribute-group-title {
      margin: 10px 0 5px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }

    .attribute-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
      line-height: 1.42;
    }

    .attribute-table th,
    .attribute-table td {
      padding: 6px 0;
      border-top: 1px solid #eef1f5;
      text-align: left;
      vertical-align: top;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .attribute-table th {
      width: 48%;
      padding-right: 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .node circle {
      stroke-width: 2.2;
      filter: drop-shadow(0 2px 3px rgba(15, 23, 42, 0.13));
    }

    .node text {
      pointer-events: none;
      fill: #172033;
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .link {
      fill: none;
      stroke-width: 1.8;
      opacity: 0.78;
    }

    .link-label {
      fill: #475569;
      font-size: 10.5px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .dim {
      opacity: 0.12;
    }

    .link-label.dim {
      opacity: 0;
    }

    .focus circle {
      stroke-width: 4px;
    }

    .empty-state {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      padding: 14px 16px;
      border: 1px solid #f59e0b;
      border-radius: 7px;
      background: #fffbeb;
      color: #78350f;
      font-size: 13px;
      display: none;
      z-index: 2;
    }

    @media (max-width: 960px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta {
        text-align: left;
      }

      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .graph-panel {
        height: 72vh;
        min-height: 560px;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>공사기성부분 내역서 RDF/RDFS 그래프</h1>
    <div class="meta">문서 계층 + 공종/원가 구간 + 클릭형 속성 패널</div>
  </header>

  <div class="toolbar">
    <button type="button" data-filter="all" class="active">전체</button>
    <button type="button" data-filter="document">1차 문서</button>
    <button type="button" data-filter="work">2차 공종</button>
    <button type="button" data-filter="cost">원가 항목</button>
    <button type="button" id="reset">초기화</button>
    <input id="search" type="search" placeholder="검색: 기성서류, 콘크리트공사, 철근공사, 거푸집">
  </div>

  <main class="layout">
    <section class="graph-panel">
      <div class="empty-state" id="load-error">D3.js를 불러오지 못했습니다. 인터넷 연결 또는 CDN 접근을 확인하세요.</div>
      <svg id="graph" role="img" aria-label="공사기성부분 내역서 RDF/RDFS 그래프"></svg>
    </section>
    <aside class="side" id="details">
      <h2>선택 노드</h2>
      <dl>
        <dt>라벨</dt>
        <dd>노드를 선택하면 RDF/RDFS 정보가 표시됩니다.</dd>
      </dl>
      <h2 class="side-section-title">노드 유형</h2>
      <div class="legend" id="legend"></div>
      <h2 class="side-section-title">관계 설명</h2>
      <div class="relation-glossary" id="relation-glossary"></div>
    </aside>
  </main>

  <script>
    const typeMeta = {
      group: { label: "문서군", fill: "#dcfce7", stroke: "#16a34a", radius: 31 },
      document: { label: "문서", fill: "#fef3c7", stroke: "#d97706", radius: 27 },
      section: { label: "공종 구간", fill: "#e0f2fe", stroke: "#0284c7", radius: 25 },
      cost: { label: "원가 항목", fill: "#fce7f3", stroke: "#db2777", radius: 24 }
    };

    const relationMeta = {
      hasPart: { label: "hasPart", color: "#475569", groups: ["document", "work"], description: "상위 문서군, 공종 구간, 내역 구간이 하위 항목을 포함" },
      hasWorkTypeSection: { label: "hasWorkTypeSection", color: "#0284c7", groups: ["work"], description: "문서가 공종별 분개 구간을 포함" },
      hasCostItem: { label: "hasCostItem", color: "#db2777", groups: ["cost"], description: "철근콘크리트공사 원가계산 구간이 원가 항목 묶음을 포함" }
    };

    const nodes = [
      {
        id: "paymentDocs",
        label: "기성서류",
        type: "group",
        cls: "ppdoc:ProgressPaymentDocumentSet",
        fxGroup: "level1",
        attributeGroups: [
          { title: "문서군 속성", rows: [["ppdoc:hasDocumentTitle", "문서군 이름"], ["ppdoc:hasPart", "철근콘크리트 공종 기성서류 포함"]] }
        ]
      },
      {
        id: "rcDocs",
        label: "철근콘크리트 공종 기성서류",
        type: "group",
        cls: "ppdoc:ReinforcedConcreteProgressPaymentDocuments",
        fxGroup: "level2",
        attributeGroups: [
          { title: "문서군 속성", rows: [["ppdoc:hasDocumentTitle", "철근콘크리트 공종 범위"], ["ppdoc:isPartOf", "기성서류에 포함"], ["ppdoc:hasPart", "내역서 포함"]] }
        ]
      },
      {
        id: "statementDocs",
        label: "내역서",
        type: "group",
        cls: "ppdoc:StatementDocument",
        fxGroup: "level3",
        attributeGroups: [
          { title: "문서군 속성", rows: [["ppdoc:hasDocumentTitle", "내역서 문서군명"], ["ppdoc:isPartOf", "철근콘크리트 공종 기성서류에 포함"], ["ppdoc:hasPart", "공사기성부분 내역서 포함"]] }
        ]
      },
      {
        id: "statement",
        label: "공사기성부분 내역서",
        type: "group",
        cls: "ppdoc:ProgressPaymentStatement",
        fxGroup: "level4",
        attributeGroups: [
          { title: "문서 메타정보", rows: [["ppdoc:hasProjectName", "공사명"], ["ppdoc:hasProgressRound", "기성 회차"], ["ppdoc:hasDocumentTitle", "문서명"], ["ppdoc:hasBaseDate", "기준일"], ["ppdoc:hasSourceFileName", "원본 파일명"]] },
          { title: "하위 문서", rows: [["ppdoc:hasPart", "원가계산서, 공종별집계표, 공종별내역서, 수량산출서"]] }
        ]
      },
      {
        id: "costSheet",
        label: "원가계산서",
        type: "document",
        cls: "ppdoc:CostCalculationSheet",
        fxGroup: "costDoc",
        detail: "철근콘크리트공사에 배부되는 원가 항목만 별도 구간으로 분개.",
        attributeGroups: [
          { title: "문서 메타정보", rows: [["ppdoc:hasDocumentTitle", "문서명"], ["ppdoc:hasSourceSheetName", "원본 시트명"], ["ppdoc:hasWorkTypeSection", "철근콘크리트공사 원가계산 구간"]] }
        ]
      },
      {
        id: "summarySheet",
        label: "공종별집계표",
        type: "document",
        cls: "ppdoc:WorkTypeSummarySheet",
        fxGroup: "summaryDoc",
        detail: "공종별 금액 집계 문서. 2차 공종 분개 적용.",
        attributeGroups: [
          { title: "문서 메타정보", rows: [["ppdoc:hasDocumentTitle", "문서명"], ["ppdoc:hasSourceSheetName", "원본 시트명"], ["ppdoc:hasWorkTypeSection", "콘크리트/철근/거푸집 및 동바리 집계 구간"]] }
        ]
      },
      {
        id: "detailSheet",
        label: "공종별내역서",
        type: "document",
        cls: "ppdoc:WorkTypeDetailSheet",
        fxGroup: "detailDoc",
        detail: "품명, 규격, 수량, 단가, 금액을 가진 내역 항목 원본 행 문서. 2차 공종 분개 적용.",
        attributeGroups: [
          { title: "표준 행 포맷", rows: [["ppdoc:hasDataFormat", "BoQItemTableFormat"], ["ppdoc:definesField", "품명, 규격, 단위, 수량, 단가, 금액"], ["ppdoc:hasBoQItem", "내역 항목 원본 행"]] }
        ]
      },
      {
        id: "quantitySheet",
        label: "수량산출서",
        type: "document",
        cls: "ppdoc:QuantityCalculationSheet",
        fxGroup: "quantityDoc",
        detail: "수량산출 근거 문서. 2차 공종 분개 적용.",
        attributeGroups: [
          { title: "수량산출 문서 속성", rows: [["ppdoc:hasSourceSheetName", "원본 시트명"], ["ppdoc:hasWorkTypeSection", "콘크리트/철근/거푸집 및 동바리 수량산출 구간"], ["ppdoc:hasPart", "수량산출 항목 원본 행"]] }
        ]
      },
      {
        id: "costRcSection",
        label: "철근콘크리트공사 원가계산",
        type: "section",
        cls: "ppdoc:CostWorkTypeSection",
        fxGroup: "costRcSection",
        detail: "콘크리트/철근/거푸집으로 다시 쪼개지 않고, RC 공종에 배부되는 원가 항목만 묶음.",
        attributeGroups: [
          { title: "원가 구간 속성", rows: [["ppdoc:hasWorkType", "철근콘크리트공사"], ["ppdoc:hasCostItem", "직접공사비, 간접비 및 법정경비, 일반관리비 및 이윤, 세금 및 총액"]] }
        ]
      },
      {
        id: "costDirect",
        label: "직접공사비",
        type: "cost",
        cls: "ppdoc:DirectCostItem",
        fxGroup: "costDirect",
        detail: "재료비, 직접노무비, 직접경비. 공종별집계표의 RC 집계에서 유입.",
        attributeGroups: [
          { title: "원가 항목 속성", rows: [["ppdoc:hasCostItemName", "원가 항목명"], ["ppdoc:hasCostCategory", "직접공사비"], ["ppdoc:hasAmount", "금액"], ["ppdoc:hasCalculationFormula", "산정식"], ["ppdoc:hasCostBasis", "공종별집계표 집계금액"]] }
        ]
      },
      {
        id: "costIndirect",
        label: "간접비 및 법정경비",
        type: "cost",
        cls: "ppdoc:IndirectCostItem",
        fxGroup: "costIndirect",
        detail: "간접노무비, 보험료, 산업안전보건관리비, 보증수수료 등 요율 산정 항목.",
        attributeGroups: [
          { title: "원가 항목 속성", rows: [["ppdoc:hasCostItemName", "원가 항목명"], ["ppdoc:hasCostCategory", "간접비 및 법정경비"], ["ppdoc:hasRate", "요율"], ["ppdoc:hasAmount", "금액"], ["ppdoc:hasCalculationFormula", "산정식"], ["ppdoc:hasCostBasis", "직접공사비 또는 노무비 기준"]] }
        ]
      },
      {
        id: "costMarkup",
        label: "일반관리비 및 이윤",
        type: "cost",
        cls: "ppdoc:MarkupCostItem",
        fxGroup: "costMarkup",
        detail: "직접비와 간접비 기반 요율 산정 항목.",
        attributeGroups: [
          { title: "원가 항목 속성", rows: [["ppdoc:hasCostItemName", "원가 항목명"], ["ppdoc:hasCostCategory", "일반관리비 및 이윤"], ["ppdoc:hasRate", "요율"], ["ppdoc:hasAmount", "금액"], ["ppdoc:hasCalculationFormula", "산정식"], ["ppdoc:hasCostBasis", "직접비 및 간접비 기준"]] }
        ]
      },
      {
        id: "costTaxTotal",
        label: "세금 및 총액",
        type: "cost",
        cls: "ppdoc:TaxAndTotalCostItem",
        fxGroup: "costTaxTotal",
        detail: "부가가치세, 총도급액, 총공사비.",
        attributeGroups: [
          { title: "원가 항목 속성", rows: [["ppdoc:hasCostItemName", "원가 항목명"], ["ppdoc:hasCostCategory", "세금 및 총액"], ["ppdoc:hasRate", "요율"], ["ppdoc:hasAmount", "금액"], ["ppdoc:hasCalculationFormula", "산정식"], ["ppdoc:hasCostBasis", "원가 항목 합계"]] }
        ]
      },
      {
        id: "summaryConcrete",
        label: "콘크리트공사 집계",
        type: "section",
        cls: "ppdoc:SummaryWorkTypeSection",
        fxGroup: "summaryConcreteSection",
        attributeGroups: [
          { title: "집계 항목 속성", rows: [["ppdoc:hasWorkType", "콘크리트공사"], ["ppdoc:hasSummaryLevel", "하위 공종 집계"], ["ppdoc:hasContractAmount", "계약금액"], ["ppdoc:hasPreviousAmount", "전회금액"], ["ppdoc:hasCurrentAmount", "금회금액"], ["ppdoc:hasCumulativeAmount", "누계금액"], ["ppdoc:hasProgressRate", "기성률"]] }
        ]
      },
      {
        id: "summaryRebar",
        label: "철근공사 집계",
        type: "section",
        cls: "ppdoc:SummaryWorkTypeSection",
        fxGroup: "summaryRebarSection",
        attributeGroups: [
          { title: "집계 항목 속성", rows: [["ppdoc:hasWorkType", "철근공사"], ["ppdoc:hasSummaryLevel", "하위 공종 집계"], ["ppdoc:hasContractAmount", "계약금액"], ["ppdoc:hasPreviousAmount", "전회금액"], ["ppdoc:hasCurrentAmount", "금회금액"], ["ppdoc:hasCumulativeAmount", "누계금액"], ["ppdoc:hasProgressRate", "기성률"]] }
        ]
      },
      {
        id: "summaryFormwork",
        label: "거푸집 및 동바리공사 집계",
        type: "section",
        cls: "ppdoc:SummaryWorkTypeSection",
        fxGroup: "summaryFormworkSection",
        attributeGroups: [
          { title: "집계 항목 속성", rows: [["ppdoc:hasWorkType", "거푸집 및 동바리공사"], ["ppdoc:hasSummaryLevel", "하위 공종 집계"], ["ppdoc:hasContractAmount", "계약금액"], ["ppdoc:hasPreviousAmount", "전회금액"], ["ppdoc:hasCurrentAmount", "금회금액"], ["ppdoc:hasCumulativeAmount", "누계금액"], ["ppdoc:hasProgressRate", "기성률"]] }
        ]
      },
      {
        id: "detailConcrete",
        label: "콘크리트공사 내역",
        type: "section",
        cls: "ppdoc:DetailWorkTypeSection",
        fxGroup: "detailConcreteSection",

    const links = [

      { source: "rcDocs", target: "statementDocs", relation: "hasPart" },
      { source: "statementDocs", target: "statement", relation: "hasPart" },
      { source: "statement", target: "costSheet", relation: "hasPart" },
      { source: "statement", target: "detailSheet", relation: "hasPart" },
      { source: "statement", target: "quantitySheet", relation: "hasPart" },
      { source: "statement", target: "summarySheet", relation: "hasPart" },
      { source: "costSheet", target: "costRcSection", relation: "hasWorkTypeSection" },
      { source: "costRcSection", target: "costDirect", relation: "hasCostItem" },
      { source: "costRcSection", target: "costIndirect", relation: "hasCostItem" },
      { source: "costRcSection", target: "costMarkup", relation: "hasCostItem" },
      { source: "costRcSection", target: "costTaxTotal", relation: "hasCostItem" },
      { source: "summarySheet", target: "summaryConcrete", relation: "hasWorkTypeSection" },
      { source: "summarySheet", target: "summaryRebar", relation: "hasWorkTypeSection" },
      { source: "summarySheet", target: "summaryFormwork", relation: "hasWorkTypeSection" },
      { source: "detailSheet", target: "detailConcrete", relation: "hasWorkTypeSection" },
      { source: "detailSheet", target: "detailRebar", relation: "hasWorkTypeSection" },
      { source: "detailSheet", target: "detailFormwork", relation: "hasWorkTypeSection" },
      { source: "quantitySheet", target: "quantityConcrete", relation: "hasWorkTypeSection" },
      { source: "quantitySheet", target: "quantityRebar", relation: "hasWorkTypeSection" },
      { source: "quantitySheet", target: "quantityFormwork", relation: "hasWorkTypeSection" }
    ];

    if (!window.d3) {
      document.getElementById("load-error").style.display = "block";
    } else {
      initGraph();
    }

    function initGraph() {
      const svg = d3.select("#graph");
      const details = document.getElementById("details");
      const search = document.getElementById("search");
      const resetButton = document.getElementById("reset");
      const nodeById = new Map(nodes.map((node) => [node.id, node]));
      let activeFilter = "all";
      let selectedId = null;

      const linkData = links.map((link) => ({
        ...link,
        source: nodeById.get(link.source),
        target: nodeById.get(link.target)
      }));

      const root = svg.append("g");
      const linkLayer = root.append("g").attr("class", "links");
      const labelLayer = root.append("g").attr("class", "link-labels");
      const nodeLayer = root.append("g").attr("class", "nodes");

      svg.append("defs")
        .selectAll("marker")
        .data(Object.entries(relationMeta))
        .join("marker")
        .attr("id", ([key]) => `arrow-${key}`)
        .attr("viewBox", "0 -5 10 10")
        .attr("refX", 20)
        .attr("refY", 0)
        .attr("markerWidth", 7)
        .attr("markerHeight", 7)
        .attr("orient", "auto")
        .append("path")
        .attr("d", "M0,-5L10,0L0,5")
        .attr("fill", ([, meta]) => meta.color);

      const zoom = d3.zoom()
        .scaleExtent([0.25, 2.8])
        .on("zoom", (event) => root.attr("transform", event.transform));

      svg.call(zoom);

      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(linkData).id((node) => node.id).distance(110).strength(0.72))
        .force("charge", d3.forceManyBody().strength(-650))
        .force("collide", d3.forceCollide().radius((node) => typeMeta[node.type].radius + 18).iterations(2))
        .force("x", d3.forceX((node) => groupX(node.fxGroup)).strength(0.11))
        .force("y", d3.forceY((node) => groupY(node.fxGroup)).strength(0.11))
        .on("tick", ticked);

      const link = linkLayer.selectAll("path")
        .data(linkData)
        .join("path")
        .attr("class", "link")
        .attr("stroke", (link) => relationMeta[link.relation].color)
        .attr("marker-end", (link) => `url(#arrow-${link.relation})`);

      const linkLabel = labelLayer.selectAll("text")
        .data(linkData)
        .join("text")
        .attr("class", "link-label")
        .text((link) => relationMeta[link.relation].label);

      const node = nodeLayer.selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended));

      node.append("circle")
        .attr("r", (node) => typeMeta[node.type].radius)
        .attr("fill", (node) => typeMeta[node.type].fill)
        .attr("stroke", (node) => typeMeta[node.type].stroke);

      node.append("text")
        .selectAll("tspan")
        .data((node) => wrapLabel(node.label).map((line, index, lines) => ({ line, index, lines })))
        .join("tspan")
        .attr("x", 0)
        .attr("dy", (datum) => datum.index === 0 ? `${-(datum.lines.length - 1) * 0.55}em` : "1.1em")
        .text((datum) => datum.line);

      node.on("click", (event, datum) => {
        event.stopPropagation();
        selectedId = datum.id;
        updateDetails(datum);
        applyVisibility();
      });

      svg.on("click", () => {
        selectedId = null;
        updateDetails(null);
        applyVisibility();
      });

      document.querySelectorAll("button[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("button[data-filter]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          activeFilter = button.dataset.filter;
          applyVisibility();
          simulation.alpha(0.35).restart();
        });
      });

      resetButton.addEventListener("click", () => {
        selectedId = null;
        search.value = "";
        activeFilter = "all";
        document.querySelectorAll("button[data-filter]").forEach((item) => item.classList.toggle("active", item.dataset.filter === "all"));
        nodes.forEach((node) => {
          node.fx = null;
          node.fy = null;
        });
        updateDetails(null);
        applyVisibility();
        fitGraph();
        simulation.alpha(0.75).restart();
      });

      search.addEventListener("input", applyVisibility);
      renderLegend();
      renderRelationGlossary();
      updateDetails(null);
      applyVisibility();
      setTimeout(fitGraph, 450);

      function groupX(group) {
        const width = svg.node().clientWidth || 1100;
        const map = {
          level1: width * 0.09,
          level2: width * 0.24,
          level3: width * 0.39,
          level4: width * 0.54,
          costDoc: width * 0.72,
          costRcSection: width * 0.84,
          costDirect: width * 0.96,
          costIndirect: width * 0.96,
          costMarkup: width * 0.96,
          costTaxTotal: width * 0.96,
          summaryDoc: width * 0.70,
          detailDoc: width * 0.70,
          quantityDoc: width * 0.70,
          summaryConcreteSection: width * 0.90,
          summaryRebarSection: width * 0.90,
          summaryFormworkSection: width * 0.90,
          detailConcreteSection: width * 0.90,
          detailRebarSection: width * 0.90,
          detailFormworkSection: width * 0.90,
          quantityConcreteSection: width * 0.90,
          quantityRebarSection: width * 0.90,
          quantityFormworkSection: width * 0.90
        };
        return map[group] || width * 0.5;
      }

      function groupY(group) {
        const height = svg.node().clientHeight || 700;
        const map = {
          level1: height * 0.46,
          level2: height * 0.46,
          level3: height * 0.46,
          level4: height * 0.46,
          costDoc: height * 0.12,
          costRcSection: height * 0.12,
          costDirect: height * 0.05,
          costIndirect: height * 0.12,
          costMarkup: height * 0.19,
          costTaxTotal: height * 0.26,
          summaryDoc: height * 0.39,
          detailDoc: height * 0.59,
          quantityDoc: height * 0.79,
          summaryConcreteSection: height * 0.33,
          summaryRebarSection: height * 0.41,
          summaryFormworkSection: height * 0.49,
          detailConcreteSection: height * 0.53,
          detailRebarSection: height * 0.69,
          detailFormworkSection: height * 0.85,
          quantityConcreteSection: height * 0.98,
          quantityRebarSection: height * 1.08,
          quantityFormworkSection: height * 1.18
        };
        return map[group] || height * 0.5;
      }

      function filteredLink(link) {
        if (activeFilter === "all") return true;
        return relationMeta[link.relation].groups.includes(activeFilter);
      }

      function matchesSearch(node) {
        const term = search.value.trim().toLowerCase();
        if (!term) return true;
        return `${node.label} ${node.cls} ${node.detail || ""} ${attributesToText(node)} ${typeMeta[node.type].label}`.toLowerCase().includes(term);
      }

      function applyVisibility() {
        const visibleLinkIds = new Set();
        linkData.forEach((linkDatum, index) => {
          if (filteredLink(linkDatum)) {
            visibleLinkIds.add(index);
          }
        });

        const related = new Set();
        linkData.forEach((linkDatum, index) => {
          if (visibleLinkIds.has(index)) {
            related.add(linkDatum.source.id);
            related.add(linkDatum.target.id);
          }
        });

        const selectedNeighbors = new Set();
        if (selectedId) {
          selectedNeighbors.add(selectedId);
          linkData.forEach((linkDatum) => {
            if (linkDatum.source.id === selectedId) selectedNeighbors.add(linkDatum.target.id);
            if (linkDatum.target.id === selectedId) selectedNeighbors.add(linkDatum.source.id);
          });
        }

        node.classed("dim", (nodeDatum) => {
          const filterDim = activeFilter !== "all" && !related.has(nodeDatum.id);
          const searchDim = !matchesSearch(nodeDatum);
          const selectedDim = selectedId && !selectedNeighbors.has(nodeDatum.id);
          return filterDim || searchDim || selectedDim;
        }).classed("focus", (nodeDatum) => nodeDatum.id === selectedId);

        link.classed("dim", (linkDatum, index) => {
          const filterDim = !visibleLinkIds.has(index);
          const searchDim = !matchesSearch(linkDatum.source) && !matchesSearch(linkDatum.target);
          const selectedDim = selectedId && linkDatum.source.id !== selectedId && linkDatum.target.id !== selectedId;
          return filterDim || searchDim || selectedDim;
        });

        linkLabel.classed("dim", (linkDatum, index) => {
          const filterDim = !visibleLinkIds.has(index);
          const searchDim = !matchesSearch(linkDatum.source) && !matchesSearch(linkDatum.target);
          const selectedDim = selectedId && linkDatum.source.id !== selectedId && linkDatum.target.id !== selectedId;
          return filterDim || searchDim || selectedDim;
        });
      }

      function ticked() {
        link.attr("d", (linkDatum) => {
          const sx = linkDatum.source.x;
          const sy = linkDatum.source.y;
          const tx = linkDatum.target.x;
          const ty = linkDatum.target.y;
          const dx = tx - sx;
          const dy = ty - sy;
          const dr = Math.sqrt(dx * dx + dy * dy) * 1.08;
          return `M${sx},${sy}A${dr},${dr} 0 0,1 ${tx},${ty}`;
        });

        linkLabel
          .attr("x", (linkDatum) => (linkDatum.source.x + linkDatum.target.x) / 2)
          .attr("y", (linkDatum) => (linkDatum.source.y + linkDatum.target.y) / 2);

        node.attr("transform", (nodeDatum) => `translate(${nodeDatum.x},${nodeDatum.y})`);
      }

      function dragstarted(event, datum) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        datum.fx = datum.x;
        datum.fy = datum.y;
      }

      function dragged(event, datum) {
        datum.fx = event.x;
        datum.fy = event.y;
      }

      function dragended(event, datum) {
        if (!event.active) simulation.alphaTarget(0);
        datum.fx = event.x;
        datum.fy = event.y;
      }

      function fitGraph() {
        const bounds = root.node().getBBox();
        const fullWidth = svg.node().clientWidth;
        const fullHeight = svg.node().clientHeight;
        if (!bounds.width || !bounds.height || !fullWidth || !fullHeight) return;
        const scale = Math.min(1.20, 0.88 / Math.max(bounds.width / fullWidth, bounds.height / fullHeight));
        const tx = fullWidth / 2 - scale * (bounds.x + bounds.width / 2);
        const ty = fullHeight / 2 - scale * (bounds.y + bounds.height / 2);
        svg.transition().duration(420).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
      }

      function updateDetails(datum) {
        const dl = details.querySelector("dl");
        if (!datum) {
          dl.innerHTML = `
            <dt>라벨</dt>
            <dd>노드를 선택하면 RDF/RDFS 정보가 표시됩니다.</dd>
          `;
          return;
        }
        const inbound = linkData.filter((linkDatum) => linkDatum.target.id === datum.id);
        const outbound = linkData.filter((linkDatum) => linkDatum.source.id === datum.id);
        dl.innerHTML = `
          <dt>라벨</dt><dd>${datum.label}</dd>
          <dt>RDF/RDFS 식별자</dt><dd>${datum.cls}</dd>
          <dt>유형</dt><dd>${typeMeta[datum.type].label}</dd>
          ${typeMeta[datum.type].description ? `<dt>유형 설명</dt><dd>${typeMeta[datum.type].description}</dd>` : ""}
          ${datum.detail ? `<dt>설명</dt><dd>${datum.detail}</dd>` : ""}
          ${datum.attributeGroups ? `<dt>속성 정보</dt><dd>${renderAttributeGroups(datum.attributeGroups)}</dd>` : ""}
          <dt>나가는 관계</dt><dd>${outbound.length ? outbound.map(formatOutboundLink).join("<br>") : "없음"}</dd>
          <dt>들어오는 관계</dt><dd>${inbound.length ? inbound.map(formatInboundLink).join("<br>") : "없음"}</dd>
        `;
      }

      function renderAttributeGroups(groups) {
        return groups.map((group) => `
          <div class="attribute-group">
            <div class="attribute-group-title">${group.title}</div>
            <table class="attribute-table">
              <tbody>
                ${group.rows.map(([property, value]) => `<tr><th>${property}</th><td>${value}</td></tr>`).join("")}
              </tbody>
            </table>
          </div>
        `).join("");
      }

      function attributesToText(node) {
        if (!node.attributeGroups) return "";
        return node.attributeGroups.flatMap((group) => group.rows.flat()).join(" ");
      }

      function formatOutboundLink(linkDatum) {
        const meta = relationMeta[linkDatum.relation];
        return `${meta.label} -> ${linkDatum.target.label}<span class="relation-detail">${meta.description}</span>`;
      }

      function formatInboundLink(linkDatum) {
        const meta = relationMeta[linkDatum.relation];
        return `${linkDatum.source.label} -> ${meta.label}<span class="relation-detail">${meta.description}</span>`;
      }

      function renderLegend() {
        document.getElementById("legend").innerHTML = Object.entries(typeMeta).map(([, meta]) => `
          <div class="legend-item">
            <span class="swatch" style="background:${meta.fill}; color:${meta.stroke}"></span>
            <span>${meta.label}</span>
          </div>
        `).join("");
      }

      function renderRelationGlossary() {
        document.getElementById("relation-glossary").innerHTML = Object.entries(relationMeta).map(([, meta]) => `
          <div class="relation-item">
            <span class="relation-dot" style="color:${meta.color}"></span>
            <div>
              <div><span class="relation-name">${meta.label}</span></div>
              <div class="relation-description">${meta.description}</div>
              <div class="relation-description">필터: ${meta.groups.map(groupLabel).join(", ")}</div>
            </div>
          </div>
        `).join("");
      }

      function groupLabel(group) {
        const labels = {
          document: "1차 문서",
          work: "2차 공종",
          cost: "원가 항목"
        };
        return labels[group] || group;
      }
    }

    function wrapLabel(label) {
      const max = 9;
      if (label.length <= max) return [label];
      const words = label.split(" ");
      if (words.length > 1) {
        const lines = [];
        let current = "";
        words.forEach((word) => {
          const next = current ? `${current} ${word}` : word;
          if (next.length > max && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        });
        if (current) lines.push(current);
        return lines.slice(0, 3);
      }
      return [
        label.slice(0, max),
        label.slice(max, max * 2),
        label.slice(max * 2, max * 3)
      ].filter(Boolean);
    }
  </script>
</body>
</html>
