<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>기성서류 RDF/RDFS D3 그래프</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d5dbe5;
      --accent: #0f766e;
      --actor: #dbeafe;
      --actor-border: #2563eb;
      --group: #dcfce7;
      --group-border: #16a34a;
      --document: #fef3c7;
      --document-border: #d97706;
      --detail: #ede9fe;
      --detail-border: #7c3aed;
      --quantity: #e0f2fe;
      --quantity-border: #0284c7;
      --evidence: #ffe4e6;
      --evidence-border: #e11d48;
      --inspection: #f3e8ff;
      --inspection-border: #9333ea;
      --procedure: #e5e7eb;
      --procedure-border: #4b5563;
      --amount: #ccfbf1;
      --amount-border: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 16px 22px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px 22px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    button,
    input {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.active {
      border-color: var(--accent);
      background: #ccfbf1;
      color: #0b4f49;
      font-weight: 700;
    }

    input {
      width: min(340px, 100%);
      padding: 0 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      height: calc(100vh - 112px);
      min-height: 620px;
    }

    .graph-panel {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background: #fbfcfe;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }

    svg:active {
      cursor: grabbing;
    }

    .side {
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }

    .side h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .side dl {
      margin: 0;
    }

    .side dt {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .side dd {
      margin: 4px 0 0;
      font-size: 13px;
      line-height: 1.48;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      margin-top: 18px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      gap: 7px;
      align-items: center;
      min-width: 0;
    }

    .side-section-title {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid currentColor;
      flex: 0 0 auto;
    }

    .relation-glossary {
      display: grid;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
    }

    .relation-item {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .relation-dot {
      width: 12px;
      height: 3px;
      margin-top: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .relation-name {
      font-weight: 700;
      color: var(--ink);
      word-break: break-word;
    }

    .relation-description {
      margin-top: 2px;
      color: var(--muted);
      line-height: 1.42;
    }

    .relation-list {
      margin: 4px 0 0;
      padding-left: 16px;
      color: var(--muted);
      line-height: 1.42;
    }

    .relation-list li {
      margin-top: 2px;
    }

    .relation-detail {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .node circle {
      stroke-width: 2.2;
      filter: drop-shadow(0 2px 3px rgba(15, 23, 42, 0.13));
    }

    .node text {
      pointer-events: none;
      fill: #172033;
      font-size: 12px;
      font-weight: 700;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .link {
      fill: none;
      stroke-width: 1.8;
      opacity: 0.78;
    }

    .link-label {
      fill: #475569;
      font-size: 10.5px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .dim {
      opacity: 0.12;
    }

    .focus circle {
      stroke-width: 4px;
    }

    .empty-state {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      padding: 14px 16px;
      border: 1px solid #f59e0b;
      border-radius: 7px;
      background: #fffbeb;
      color: #78350f;
      font-size: 13px;
      display: none;
      z-index: 2;
    }

    @media (max-width: 960px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta {
        text-align: left;
      }

      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .graph-panel {
        height: 72vh;
        min-height: 560px;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>철근콘크리트 공종 기성서류 RDF/RDFS 그래프</h1>
    <div class="meta">D3.js force graph</div>
  </header>

  <div class="toolbar">
    <button type="button" data-filter="all" class="active">전체</button>
    <button type="button" data-filter="workflow">문서 흐름</button>
    <button type="button" data-filter="statement">내역/집계</button>
    <button type="button" data-filter="basis">산출 근거</button>
    <button type="button" data-filter="evidence">증빙</button>
    <button type="button" data-filter="inspection">검측/사진</button>
    <button type="button" id="reset">초기화</button>
    <input id="search" type="search" placeholder="검색: 철근, 발주처, 수량산출">
  </div>

  <main class="layout">
    <section class="graph-panel">
      <div class="empty-state" id="load-error">D3.js를 불러오지 못했습니다. 인터넷 연결 또는 CDN 접근을 확인하세요.</div>
      <svg id="graph" role="img" aria-label="기성서류 RDF/RDFS 그래프"></svg>
    </section>
    <aside class="side" id="details">
      <h2>선택 노드</h2>
      <dl>
        <dt>라벨</dt>
        <dd>노드를 선택하면 RDF/RDFS 정보가 표시됩니다.</dd>
      </dl>
      <h2 class="side-section-title">노드 유형</h2>
      <div class="legend" id="legend"></div>
      <h2 class="side-section-title">관계 설명</h2>
      <div class="relation-glossary" id="relation-glossary"></div>
    </aside>
  </main>

  <script>
    const typeMeta = {
      actor: { label: "행위자", fill: "#dbeafe", stroke: "#2563eb", radius: 29 },
      group: { label: "문서군", fill: "#dcfce7", stroke: "#16a34a", radius: 31 },
      document: { label: "문서", fill: "#fef3c7", stroke: "#d97706", radius: 27 },
      detail: { label: "내역", fill: "#ede9fe", stroke: "#7c3aed", radius: 30 },
      quantity: { label: "산출", fill: "#e0f2fe", stroke: "#0284c7", radius: 28 },
      field: { label: "필드", fill: "#f8fafc", stroke: "#64748b", radius: 23 },
      evidence: { label: "증빙", fill: "#ffe4e6", stroke: "#e11d48", radius: 28 },
      inspection: { label: "검측", fill: "#f3e8ff", stroke: "#9333ea", radius: 28 },
      procedure: { label: "절차", fill: "#e5e7eb", stroke: "#4b5563", radius: 28 },
      amount: { label: "집계", fill: "#ccfbf1", stroke: "#0f766e", radius: 28 }
    };

    const relationMeta = {
      creates: { label: "creates", color: "#2563eb", groups: ["workflow"], description: ["행위자가 문서 또는 문서군 작성"] },
      hasPart: { label: "hasPart", color: "#475569", groups: ["workflow", "statement", "inspection"], description: ["상위-하위 구성 관계"] },
      attaches: { label: "attaches", color: "#0f766e", groups: ["workflow"], description: ["공문 또는 문서군에 첨부 문서 연결"] },
      submittedTo: { label: "submittedTo", color: "#2563eb", groups: ["workflow"], description: ["문서 또는 문서군의 제출 대상"] },
      forwardedTo: { label: "forwardedTo", color: "#2563eb", groups: ["workflow"], description: ["다음 검토 주체로 송부"] },
      reviewedBy: { label: "reviewedBy", color: "#64748b", groups: ["workflow"], description: ["문서 검토 주체 표시"] },
      inspectedBy: { label: "inspectedBy", color: "#64748b", groups: ["inspection"], description: ["검사 절차 수행자 표시"] },
      approvedBy: { label: "approvedBy", color: "#059669", groups: ["workflow", "inspection"], description: ["문서, 절차, 결과의 승인 주체"] },
      precedes: { label: "precedes", color: "#334155", groups: ["workflow"], description: ["업무 흐름의 선후 관계"] },
      aggregatesTo: { label: "aggregatesTo", color: "#0f766e", groups: ["statement"], description: ["하위 내역을 상위 집계로 합산"] },
      isQuantityBasisFor: { label: "isQuantityBasisFor", color: "#0284c7", groups: ["basis"], description: ["수량산출서 또는 산출 항목의 산정 근거 관계"] },
      hasInformationField: { label: "hasInformationField", color: "#64748b", groups: ["statement", "basis"], description: ["문서나 산출서의 정보 필드 정의"] },
      evidences: { label: "evidences", color: "#e11d48", groups: ["evidence"], description: ["자재 증빙 문서와 공종 내역 연결"] },
      isInspectionBasisFor: { label: "isInspectionBasisFor", color: "#9333ea", groups: ["inspection"], description: ["검측 문서와 공종 내역 연결"] },
      isPhotoEvidenceFor: { label: "isPhotoEvidenceFor", color: "#7c3aed", groups: ["inspection"], description: ["사진대지와 증빙 대상 연결"] }
    };

    const nodes = [
      { id: "contractor", label: "시공사", type: "actor", cls: "ppdoc:Contractor", fxGroup: "workflow" },
      { id: "site", label: "현장", type: "actor", cls: "ppdoc:SiteOffice", fxGroup: "workflow" },
      { id: "supervision", label: "감리본사", type: "actor", cls: "ppdoc:SupervisionHeadOffice", fxGroup: "workflow" },
      { id: "headOffice", label: "본사", type: "actor", cls: "ppdoc:HeadOffice", fxGroup: "workflow" },
      { id: "owner", label: "발주처", type: "actor", cls: "ppdoc:Owner", fxGroup: "workflow" },
      { id: "inspector", label: "기성검사자", type: "actor", cls: "ppdoc:Inspector", fxGroup: "inspection" },

      { id: "contractorPackage", label: "시공사 기성서류", type: "group", cls: "ppdoc:ContractorProgressPaymentPackage", fxGroup: "workflow" },
      { id: "officialLetter", label: "공문", type: "document", cls: "ppdoc:OfficialLetter", fxGroup: "workflow" },
      { id: "attachments", label: "첨부서류", type: "group", cls: "ppdoc:AttachmentBundle", fxGroup: "workflow" },
      { id: "inspectionRequest", label: "기성부분 검사원", type: "document", cls: "ppdoc:ProgressPaymentInspectionRequest", fxGroup: "workflow" },

      { id: "statement", label: "내역서", type: "group", cls: "ppdoc:StatementDocument", fxGroup: "statement" },
      { id: "claimSummary", label: "청구기성 요약", type: "document", cls: "ppdoc:ProgressPaymentClaimSummary", fxGroup: "statement" },
      { id: "progressStatement", label: "공사기성부분 내역서", type: "group", cls: "ppdoc:ProgressPaymentStatement", fxGroup: "statement" },
      { id: "costSheet", label: "원가계산서", type: "document", cls: "ppdoc:CostCalculationSheet", fxGroup: "statement" },
      { id: "summarySheet", label: "공종별집계표", type: "document", cls: "ppdoc:WorkTypeSummarySheet", fxGroup: "statement" },
      { id: "detailSheet", label: "공종별내역서", type: "document", cls: "ppdoc:WorkTypeDetailSheet", fxGroup: "statement" },
      { id: "quantitySheet", label: "수량산출서", type: "document", cls: "ppdoc:QuantityCalculationSheet", fxGroup: "basis" },
      { id: "rebarQuantitySheet", label: "철근 수량산출서", type: "document", cls: "ppdoc:RebarQuantityCalculationSheet", fxGroup: "basis" },
      { id: "concreteQuantitySheet", label: "콘크리트 수량산출서", type: "document", cls: "ppdoc:ConcreteQuantityCalculationSheet", fxGroup: "basis" },
      { id: "formworkQuantitySheet", label: "거푸집 수량산출서", type: "document", cls: "ppdoc:FormworkQuantityCalculationSheet", fxGroup: "basis" },

      { id: "rebarDetail", label: "철근공사 내역", type: "detail", cls: "ppdoc:RebarWorkDetailGroup", fxGroup: "statement" },
      { id: "concreteDetail", label: "콘크리트공사 내역", type: "detail", cls: "ppdoc:ConcreteWorkDetailGroup", fxGroup: "statement" },
      { id: "formworkDetail", label: "거푸집공사 내역", type: "detail", cls: "ppdoc:FormworkDetailGroup", fxGroup: "statement" },

      { id: "rebarSummary", label: "철근공사 집계금액", type: "amount", cls: "ppdoc:SummaryAmount", fxGroup: "statement" },
      { id: "concreteSummary", label: "콘크리트공사 집계금액", type: "amount", cls: "ppdoc:SummaryAmount", fxGroup: "statement" },
      { id: "formworkSummary", label: "거푸집공사 집계금액", type: "amount", cls: "ppdoc:SummaryAmount", fxGroup: "statement" },
      { id: "rcSummary", label: "철근콘크리트공사 집계금액", type: "amount", cls: "ppdoc:SummaryAmount", fxGroup: "statement" },

      { id: "rebarQuantity", label: "철근 수량산출 항목", type: "quantity", cls: "ppdoc:RebarQuantityCalculationItem", fxGroup: "basis" },
      { id: "concreteQuantity", label: "콘크리트 수량산출 항목", type: "quantity", cls: "ppdoc:ConcreteQuantityCalculationItem", fxGroup: "basis" },
      { id: "formworkQuantity", label: "거푸집 수량산출 항목", type: "quantity", cls: "ppdoc:FormworkQuantityCalculationItem", fxGroup: "basis" },

      { id: "fieldItemName", label: "품명", type: "field", cls: "ppdoc:field-item-name", fxGroup: "statement" },
      { id: "fieldSpecification", label: "규격", type: "field", cls: "ppdoc:field-specification", fxGroup: "statement" },
      { id: "fieldQuantityUnit", label: "단위", type: "field", cls: "ppdoc:field-quantity-unit", fxGroup: "statement" },
      { id: "fieldContractQuantity", label: "계약수량", type: "field", cls: "ppdoc:field-contract-quantity", fxGroup: "statement" },
      { id: "fieldPreviousQuantity", label: "전회수량", type: "field", cls: "ppdoc:field-previous-quantity", fxGroup: "statement" },
      { id: "fieldCurrentQuantity", label: "금회수량", type: "field", cls: "ppdoc:field-current-quantity", fxGroup: "statement" },
      { id: "fieldCumulativeQuantity", label: "누계수량", type: "field", cls: "ppdoc:field-cumulative-quantity", fxGroup: "statement" },
      { id: "fieldUnitPrice", label: "단가", type: "field", cls: "ppdoc:field-unit-price", fxGroup: "statement" },
      { id: "fieldAmount", label: "금액", type: "field", cls: "ppdoc:field-amount", fxGroup: "statement" },

      { id: "fieldLocation", label: "위치", type: "field", cls: "ppdoc:field-location", fxGroup: "basis" },
      { id: "fieldMemberName", label: "부재명", type: "field", cls: "ppdoc:field-member-name", fxGroup: "basis" },
      { id: "fieldRebarSpecification", label: "철근 규격", type: "field", cls: "ppdoc:field-rebar-specification", fxGroup: "basis" },

      { id: "fieldWidth", label: "폭", type: "field", cls: "ppdoc:field-width", fxGroup: "basis" },

      { id: "fieldCalculatedArea", label: "산출면적", type: "field", cls: "ppdoc:field-calculated-area", fxGroup: "basis" },

      { id: "concreteEvidence", label: "레미콘 납품서", type: "evidence", cls: "ppdoc:MaterialEvidenceDocument", fxGroup: "evidence" },
      { id: "formworkEvidence", label: "거푸집 검수자료", type: "evidence", cls: "ppdoc:MaterialEvidenceDocument", fxGroup: "evidence" },

      { id: "inspectionGroup", label: "검측서류 및 사진대지", type: "group", cls: "ppdoc:InspectionAndPhotoDocumentGroup", fxGroup: "inspection" },
      { id: "rebarChecklist", label: "철근 배근 검측체크리스트", type: "inspection", cls: "ppdoc:InspectionDocument", fxGroup: "inspection" },
      { id: "concreteDaily", label: "콘크리트 타설일보", type: "inspection", cls: "ppdoc:InspectionDocument", fxGroup: "inspection" },
      { id: "formworkChecklist", label: "거푸집 설치 검측체크리스트", type: "inspection", cls: "ppdoc:InspectionDocument", fxGroup: "inspection" },
      { id: "rebarPhoto", label: "철근 배근 사진대지", type: "document", cls: "ppdoc:PhotoSheet", fxGroup: "inspection" },
      { id: "concretePhoto", label: "콘크리트 타설 사진대지", type: "document", cls: "ppdoc:PhotoSheet", fxGroup: "inspection" },
      { id: "formworkPhoto", label: "거푸집 설치 사진대지", type: "document", cls: "ppdoc:PhotoSheet", fxGroup: "inspection" },

      { id: "siteSubmission", label: "현장-감리본사 공문발송 문서군", type: "group", cls: "ppdoc:SiteToSupervisionSubmissionPackage", fxGroup: "workflow" },
      { id: "supervisionReport", label: "기성부분 감리조서", type: "document", cls: "ppdoc:SupervisionProgressPaymentReport", fxGroup: "workflow" },
      { id: "inspectionPlan", label: "공사 기성검사 수행계획서", type: "document", cls: "ppdoc:InspectionExecutionPlan", fxGroup: "workflow" },
      { id: "ownerSubmission", label: "본사-발주처 공문발송 문서군", type: "group", cls: "ppdoc:HeadOfficeToOwnerSubmissionPackage", fxGroup: "workflow" },
      { id: "appointment", label: "검사자 임명 및 검사일자 통보", type: "document", cls: "ppdoc:InspectorAppointmentNotice", fxGroup: "workflow" },

      { id: "inspection", label: "기성검사", type: "procedure", cls: "ppdoc:ProgressPaymentInspection", fxGroup: "inspection" },
      { id: "documentInspection", label: "서류검사", type: "procedure", cls: "ppdoc:DocumentInspection", fxGroup: "inspection" },
      { id: "siteInspection", label: "현장검사", type: "procedure", cls: "ppdoc:SiteInspection", fxGroup: "inspection" },
      { id: "inspectionPhoto", label: "검사사진 대지", type: "document", cls: "ppdoc:PhotoSheet", fxGroup: "inspection" },
      { id: "resultReport", label: "기성검사 결과 보고", type: "group", cls: "ppdoc:InspectionResultReportPackage", fxGroup: "workflow" },
      { id: "inspectionRecord", label: "기성검사 조서", type: "document", cls: "ppdoc:ProgressPaymentInspectionRecord", fxGroup: "workflow" },
      { id: "reviewOpinion", label: "기성검토의견서", type: "document", cls: "ppdoc:ProgressPaymentReviewOpinion", fxGroup: "workflow" },
      { id: "attendance", label: "공사관리관 입회확인서", type: "document", cls: "ppdoc:ConstructionManagerAttendanceConfirmation", fxGroup: "workflow" },
      { id: "ownerApproval", label: "발주처 승인", type: "procedure", cls: "ppdoc:OwnerApproval", fxGroup: "workflow" },
      { id: "boundSubmission", label: "기성서류 내역서 제본 제출", type: "procedure", cls: "ppdoc:BoundStatementSubmission", fxGroup: "workflow" }
    ];

    const links = [
      { source: "contractor", target: "contractorPackage", relation: "creates" },
      { source: "contractorPackage", target: "officialLetter", relation: "hasPart" },
      { source: "contractorPackage", target: "attachments", relation: "hasPart" },
      { source: "attachments", target: "inspectionRequest", relation: "attaches" },
      { source: "attachments", target: "statement", relation: "attaches" },
      { source: "attachments", target: "materialLedger", relation: "attaches" },
      { source: "attachments", target: "inspectionGroup", relation: "attaches" },
      { source: "contractorPackage", target: "site", relation: "submittedTo" },
      { source: "site", target: "supervision", relation: "forwardedTo" },

      { source: "statement", target: "claimSummary", relation: "hasPart" },
      { source: "statement", target: "progressStatement", relation: "hasPart" },
      { source: "progressStatement", target: "costSheet", relation: "hasPart" },
      { source: "progressStatement", target: "summarySheet", relation: "hasPart" },

      { source: "progressStatement", target: "quantitySheet", relation: "hasPart" },
      { source: "detailSheet", target: "rebarDetail", relation: "hasPart" },

      { source: "detailSheet", target: "formworkDetail", relation: "hasPart" },
      { source: "detailSheet", target: "fieldItemName", relation: "hasInformationField" },
      { source: "detailSheet", target: "fieldSpecification", relation: "hasInformationField" },

      { source: "detailSheet", target: "fieldCurrentQuantity", relation: "hasInformationField" },
      { source: "detailSheet", target: "fieldCumulativeQuantity", relation: "hasInformationField" },
      { source: "detailSheet", target: "fieldUnitPrice", relation: "hasInformationField" },
      { source: "detailSheet", target: "fieldAmount", relation: "hasInformationField" },
      { source: "summarySheet", target: "rebarSummary", relation: "hasPart" },
      { source: "summarySheet", target: "concreteSummary", relation: "hasPart" },
      { source: "summarySheet", target: "formworkSummary", relation: "hasPart" },
      { source: "summarySheet", target: "rcSummary", relation: "hasPart" },
      { source: "rebarDetail", target: "rebarSummary", relation: "aggregatesTo" },
      { source: "concreteDetail", target: "concreteSummary", relation: "aggregatesTo" },
      { source: "formworkDetail", target: "formworkSummary", relation: "aggregatesTo" },
      { source: "rebarSummary", target: "rcSummary", relation: "aggregatesTo" },
      { source: "concreteSummary", target: "rcSummary", relation: "aggregatesTo" },
      { source: "formworkSummary", target: "rcSummary", relation: "aggregatesTo" },

      { source: "quantitySheet", target: "rebarQuantitySheet", relation: "hasPart" },

      { source: "quantitySheet", target: "formworkQuantitySheet", relation: "hasPart" },
      { source: "rebarQuantitySheet", target: "rebarQuantity", relation: "hasPart" },
      { source: "concreteQuantitySheet", target: "concreteQuantity", relation: "hasPart" },
      { source: "formworkQuantitySheet", target: "formworkQuantity", relation: "hasPart" },
      { source: "rebarQuantitySheet", target: "fieldLocation", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldMemberName", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldRebarSpecification", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldRebarDiameter", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldLength", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldCount", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldUnitWeight", relation: "hasInformationField" },
      { source: "rebarQuantitySheet", target: "fieldCalculatedWeight", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldLocation", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldMemberName", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldConcreteStrength", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldLength", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldWidth", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldHeight", relation: "hasInformationField" },
      { source: "concreteQuantitySheet", target: "fieldCalculatedVolume", relation: "hasInformationField" },
      { source: "formworkQuantitySheet", target: "fieldLocation", relation: "hasInformationField" },
      { source: "formworkQuantitySheet", target: "fieldMemberName", relation: "hasInformationField" },
      { source: "formworkQuantitySheet", target: "fieldFormworkType", relation: "hasInformationField" },
      { source: "formworkQuantitySheet", target: "fieldLength", relation: "hasInformationField" },
      { source: "formworkQuantitySheet", target: "fieldHeight", relation: "hasInformationField" },
      { source: "formworkQuantitySheet", target: "fieldCalculatedArea", relation: "hasInformationField" },
      { source: "rebarQuantity", target: "rebarDetail", relation: "isQuantityBasisFor" },
      { source: "concreteQuantity", target: "concreteDetail", relation: "isQuantityBasisFor" },
      { source: "formworkQuantity", target: "formworkDetail", relation: "isQuantityBasisFor" },

      { source: "materialLedger", target: "rebarEvidence", relation: "hasPart" },
      { source: "materialLedger", target: "concreteEvidence", relation: "hasPart" },
      { source: "materialLedger", target: "formworkEvidence", relation: "hasPart" },
      { source: "rebarEvidence", target: "rebarDetail", relation: "evidences" },
      { source: "concreteEvidence", target: "concreteDetail", relation: "evidences" },
      { source: "formworkEvidence", target: "formworkDetail", relation: "evidences" },

      { source: "inspectionGroup", target: "rebarChecklist", relation: "hasPart" },
      { source: "inspectionGroup", target: "concreteDaily", relation: "hasPart" },
      { source: "inspectionGroup", target: "formworkChecklist", relation: "hasPart" },
      { source: "inspectionGroup", target: "rebarPhoto", relation: "hasPart" },
      { source: "inspectionGroup", target: "concretePhoto", relation: "hasPart" },
      { source: "inspectionGroup", target: "formworkPhoto", relation: "hasPart" },
      { source: "rebarChecklist", target: "rebarDetail", relation: "isInspectionBasisFor" },
      { source: "concreteDaily", target: "concreteDetail", relation: "isInspectionBasisFor" },
      { source: "formworkChecklist", target: "formworkDetail", relation: "isInspectionBasisFor" },
      { source: "rebarPhoto", target: "rebarChecklist", relation: "isPhotoEvidenceFor" },
      { source: "concretePhoto", target: "concreteDaily", relation: "isPhotoEvidenceFor" },
      { source: "formworkPhoto", target: "formworkChecklist", relation: "isPhotoEvidenceFor" },

      { source: "siteSubmission", target: "supervision", relation: "forwardedTo" },
      { source: "siteSubmission", target: "supervisionReport", relation: "hasPart" },
      { source: "siteSubmission", target: "inspectionPlan", relation: "hasPart" },
      { source: "supervisionReport", target: "supervision", relation: "reviewedBy" },
      { source: "ownerSubmission", target: "owner", relation: "submittedTo" },
      { source: "ownerSubmission", target: "appointment", relation: "hasPart" },
      { source: "ownerSubmission", target: "siteSubmission", relation: "attaches" },
      { source: "owner", target: "inspection", relation: "precedes" },
      { source: "inspection", target: "inspector", relation: "inspectedBy" },
      { source: "inspection", target: "documentInspection", relation: "hasPart" },
      { source: "inspection", target: "siteInspection", relation: "hasPart" },
      { source: "inspection", target: "inspectionPhoto", relation: "hasPart" },
      { source: "inspection", target: "resultReport", relation: "precedes" },
      { source: "resultReport", target: "inspectionRecord", relation: "hasPart" },
      { source: "resultReport", target: "reviewOpinion", relation: "hasPart" },
      { source: "resultReport", target: "attendance", relation: "hasPart" },
      { source: "resultReport", target: "owner", relation: "submittedTo" },
      { source: "resultReport", target: "ownerApproval", relation: "precedes" },
      { source: "ownerApproval", target: "owner", relation: "approvedBy" },
      { source: "ownerApproval", target: "boundSubmission", relation: "precedes" }
    ];

    if (!window.d3) {
      document.getElementById("load-error").style.display = "block";
    } else {
      initGraph();
    }

    function initGraph() {
      const svg = d3.select("#graph");
      const details = document.getElementById("details");
      const search = document.getElementById("search");
      const resetButton = document.getElementById("reset");
      const nodeById = new Map(nodes.map((node) => [node.id, node]));
      let activeFilter = "all";
      let selectedId = null;

      const linkData = links.map((link) => ({
        ...link,
        source: nodeById.get(link.source),
        target: nodeById.get(link.target)
      }));

      const root = svg.append("g");
      const linkLayer = root.append("g").attr("class", "links");
      const labelLayer = root.append("g").attr("class", "link-labels");
      const nodeLayer = root.append("g").attr("class", "nodes");

      svg.append("defs")
        .selectAll("marker")
        .data(Object.entries(relationMeta))
        .join("marker")
        .attr("id", ([key]) => `arrow-${key}`)
        .attr("viewBox", "0 -5 10 10")
        .attr("refX", 20)
        .attr("refY", 0)
        .attr("markerWidth", 7)
        .attr("markerHeight", 7)
        .attr("orient", "auto")
        .append("path")
        .attr("d", "M0,-5L10,0L0,5")
        .attr("fill", ([, meta]) => meta.color);

      const zoom = d3.zoom()
        .scaleExtent([0.25, 2.8])
        .on("zoom", (event) => root.attr("transform", event.transform));

      svg.call(zoom);

      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(linkData).id((node) => node.id).distance((link) => link.relation === "hasInformationField" ? 64 : link.relation === "hasPart" ? 82 : 130).strength(0.72))
        .force("charge", d3.forceManyBody().strength(-600))
        .force("collide", d3.forceCollide().radius((node) => typeMeta[node.type].radius + 18).iterations(2))
        .force("x", d3.forceX((node) => groupX(node.fxGroup)).strength(0.10))
        .force("y", d3.forceY((node) => groupY(node.fxGroup)).strength(0.10))
        .on("tick", ticked);

      const link = linkLayer.selectAll("path")
        .data(linkData)
        .join("path")
        .attr("class", "link")
        .attr("stroke", (link) => relationMeta[link.relation].color)
        .attr("marker-end", (link) => `url(#arrow-${link.relation})`);

      const linkLabel = labelLayer.selectAll("text")
        .data(linkData)
        .join("text")
        .attr("class", "link-label")
        .text((link) => relationMeta[link.relation].label);

      const node = nodeLayer.selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended));

      node.append("circle")
        .attr("r", (node) => typeMeta[node.type].radius)
        .attr("fill", (node) => typeMeta[node.type].fill)
        .attr("stroke", (node) => typeMeta[node.type].stroke);

      node.append("text")
        .selectAll("tspan")
        .data((node) => wrapLabel(node.label).map((line, index, lines) => ({ line, index, lines })))
        .join("tspan")
        .attr("x", 0)
        .attr("dy", (datum) => datum.index === 0 ? `${-(datum.lines.length - 1) * 0.55}em` : "1.1em")
        .text((datum) => datum.line);

      node.on("click", (event, datum) => {
        event.stopPropagation();
        selectedId = datum.id;
        updateDetails(datum);
        applyVisibility();
      });

      svg.on("click", () => {
        selectedId = null;
        updateDetails(null);
        applyVisibility();
      });

      document.querySelectorAll("button[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("button[data-filter]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          activeFilter = button.dataset.filter;
          applyVisibility();
          simulation.alpha(0.35).restart();
        });
      });

      resetButton.addEventListener("click", () => {
        selectedId = null;
        search.value = "";
        activeFilter = "all";
        document.querySelectorAll("button[data-filter]").forEach((item) => item.classList.toggle("active", item.dataset.filter === "all"));
        nodes.forEach((node) => {
          node.fx = null;
          node.fy = null;
        });
        updateDetails(null);
        applyVisibility();
        fitGraph();
        simulation.alpha(0.75).restart();
      });

      search.addEventListener("input", applyVisibility);
      renderLegend();
      renderRelationGlossary();
      updateDetails(null);
      applyVisibility();
      setTimeout(fitGraph, 450);

      function groupX(group) {
        const width = svg.node().clientWidth || 1100;
        const map = {
          workflow: width * 0.30,
          statement: width * 0.48,
          basis: width * 0.48,
          evidence: width * 0.63,
          inspection: width * 0.72
        };
        return map[group] || width * 0.5;
      }

      function groupY(group) {
        const height = svg.node().clientHeight || 700;
        const map = {
          workflow: height * 0.34,
          statement: height * 0.42,
          basis: height * 0.68,
          evidence: height * 0.78,
          inspection: height * 0.55
        };
        return map[group] || height * 0.5;
      }

      function filteredLink(link) {
        if (activeFilter === "all") return true;
        return relationMeta[link.relation].groups.includes(activeFilter);
      }

      function matchesSearch(node) {
        const term = search.value.trim().toLowerCase();
        if (!term) return true;
        return `${node.label} ${node.cls} ${typeMeta[node.type].label}`.toLowerCase().includes(term);
      }

      function applyVisibility() {
        const visibleLinkIds = new Set();
        linkData.forEach((linkDatum, index) => {
          if (filteredLink(linkDatum)) {
            visibleLinkIds.add(index);
          }
        });

        const related = new Set();
        linkData.forEach((linkDatum, index) => {
          if (visibleLinkIds.has(index)) {
            related.add(linkDatum.source.id);
            related.add(linkDatum.target.id);
          }
        });

        const selectedNeighbors = new Set();
        if (selectedId) {
          selectedNeighbors.add(selectedId);
          linkData.forEach((linkDatum) => {
            if (linkDatum.source.id === selectedId) selectedNeighbors.add(linkDatum.target.id);
            if (linkDatum.target.id === selectedId) selectedNeighbors.add(linkDatum.source.id);
          });
        }

        node.classed("dim", (nodeDatum) => {
          const filterDim = activeFilter !== "all" && !related.has(nodeDatum.id);
          const searchDim = !matchesSearch(nodeDatum);
          const selectedDim = selectedId && !selectedNeighbors.has(nodeDatum.id);
          return filterDim || searchDim || selectedDim;
        }).classed("focus", (nodeDatum) => nodeDatum.id === selectedId);

        link.classed("dim", (linkDatum, index) => {
          const filterDim = !visibleLinkIds.has(index);
          const searchDim = !matchesSearch(linkDatum.source) && !matchesSearch(linkDatum.target);
          const selectedDim = selectedId && linkDatum.source.id !== selectedId && linkDatum.target.id !== selectedId;
          return filterDim || searchDim || selectedDim;
        });

        linkLabel.classed("dim", (linkDatum, index) => {
          const filterDim = !visibleLinkIds.has(index);
          const searchDim = !matchesSearch(linkDatum.source) && !matchesSearch(linkDatum.target);
          const selectedDim = selectedId && linkDatum.source.id !== selectedId && linkDatum.target.id !== selectedId;
          return filterDim || searchDim || selectedDim;
        });
      }

      function ticked() {
        link.attr("d", (linkDatum) => {
          const sx = linkDatum.source.x;
          const sy = linkDatum.source.y;
          const tx = linkDatum.target.x;
          const ty = linkDatum.target.y;
          const dx = tx - sx;
          const dy = ty - sy;
          const dr = Math.sqrt(dx * dx + dy * dy) * 1.18;
          return `M${sx},${sy}A${dr},${dr} 0 0,1 ${tx},${ty}`;
        });

        linkLabel
          .attr("x", (linkDatum) => (linkDatum.source.x + linkDatum.target.x) / 2)
          .attr("y", (linkDatum) => (linkDatum.source.y + linkDatum.target.y) / 2);

        node.attr("transform", (nodeDatum) => `translate(${nodeDatum.x},${nodeDatum.y})`);
      }

      function dragstarted(event, datum) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        datum.fx = datum.x;
        datum.fy = datum.y;
      }

      function dragged(event, datum) {
        datum.fx = event.x;
        datum.fy = event.y;
      }

      function dragended(event, datum) {
        if (!event.active) simulation.alphaTarget(0);
        datum.fx = event.x;
        datum.fy = event.y;
      }

      function fitGraph() {
        const bounds = root.node().getBBox();
        const fullWidth = svg.node().clientWidth;
        const fullHeight = svg.node().clientHeight;
        if (!bounds.width || !bounds.height || !fullWidth || !fullHeight) return;
        const scale = Math.min(1.25, 0.88 / Math.max(bounds.width / fullWidth, bounds.height / fullHeight));
        const tx = fullWidth / 2 - scale * (bounds.x + bounds.width / 2);
        const ty = fullHeight / 2 - scale * (bounds.y + bounds.height / 2);
        svg.transition().duration(420).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
      }

      function updateDetails(datum) {
        const dl = details.querySelector("dl");
        if (!datum) {
          dl.innerHTML = `
            <dt>라벨</dt>
            <dd>노드를 선택하면 RDF/RDFS 정보가 표시됩니다.</dd>
          `;
          return;
        }
        const inbound = linkData.filter((linkDatum) => linkDatum.target.id === datum.id);
        const outbound = linkData.filter((linkDatum) => linkDatum.source.id === datum.id);
        dl.innerHTML = `
          <dt>라벨</dt><dd>${datum.label}</dd>
          <dt>RDFS 클래스</dt><dd>${datum.cls}</dd>
          <dt>유형</dt><dd>${typeMeta[datum.type].label}</dd>
          <dt>나가는 관계</dt><dd>${outbound.length ? outbound.map(formatOutboundLink).join("<br>") : "없음"}</dd>
          <dt>들어오는 관계</dt><dd>${inbound.length ? inbound.map(formatInboundLink).join("<br>") : "없음"}</dd>
        `;
      }

      function formatOutboundLink(linkDatum) {
        const meta = relationMeta[linkDatum.relation];
        return `${meta.label} → ${linkDatum.target.label}<span class="relation-detail">${formatRelationDetail(meta)}</span>`;
      }

      function formatInboundLink(linkDatum) {
        const meta = relationMeta[linkDatum.relation];
        return `${linkDatum.source.label} → ${meta.label}<span class="relation-detail">${formatRelationDetail(meta)}</span>`;
      }

      function renderLegend() {
        document.getElementById("legend").innerHTML = Object.entries(typeMeta).map(([, meta]) => `
          <div class="legend-item">
            <span class="swatch" style="background:${meta.fill}; color:${meta.stroke}"></span>
            <span>${meta.label}</span>
          </div>
        `).join("");
      }

      function renderRelationGlossary() {
        document.getElementById("relation-glossary").innerHTML = Object.entries(relationMeta).map(([, meta]) => `
          <div class="relation-item">
            <span class="relation-dot" style="color:${meta.color}"></span>
            <div>
              <div><span class="relation-name">${meta.label}</span></div>
              <ul class="relation-list">
                ${meta.description.map((item) => `<li>${item}</li>`).join("")}
              </ul>
              <div class="relation-description">필터: ${meta.groups.map(groupLabel).join(", ")}</div>
            </div>
          </div>
        `).join("");
      }

      function formatRelationDetail(meta) {
        return meta.description.map((item) => `- ${item}`).join("<br>");
      }

      function groupLabel(group) {
        const labels = {
          workflow: "문서 흐름",
          statement: "내역/집계",
          basis: "산출 근거",
          evidence: "증빙",
          inspection: "검측/사진"
        };
        return labels[group] || group;
      }
    }

    function wrapLabel(label) {
      const max = 9;
      if (label.length <= max) return [label];
      const words = label.split(" ");
      if (words.length > 1) {
        const lines = [];
        let current = "";
        words.forEach((word) => {
          const next = current ? `${current} ${word}` : word;
          if (next.length > max && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        });
        if (current) lines.push(current);
        return lines.slice(0, 3);
      }
      return [
        label.slice(0, max),
        label.slice(max, max * 2),
        label.slice(max * 2, max * 3)
      ].filter(Boolean);
    }
